# LearnLoop AI — run API + UI together
# Prerequisites: Docker Desktop (Windows/Mac) or Docker Engine + Compose (Linux)
#
# Usage:
#   cp backend/.env.example .env   # optional: add OPENAI_API_KEY for real AI
#   docker compose up --build
#   Open http://localhost:8080  (web app)  |  http://localhost:5000  (API info page)

services:
  backend:
    build:
      context: .
      dockerfile: backend/Dockerfile
    ports:
      - "5000:5000"
    environment:
      PORT: "5000"
      # Compose reads variables from a `.env` file next to this file (if present).
      OPENAI_API_KEY: ${OPENAI_API_KEY:-}
      OPENAI_MODEL: ${OPENAI_MODEL:-gpt-4o-mini}

  frontend:
    build:
      context: .
      dockerfile: frontend/Dockerfile
    ports:
      - "8080:80"
    depends_on:
      - backend
